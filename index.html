<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roopantar — रूपान्तर</title>
  <meta name="description" content="An immersive interior design app — transform your space with a conversation." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='65' font-size='70' text-anchor='middle' fill='%23d4a373'%3Eरू%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #1a1410;
      --fg: #f4ede4;
      --accent: #d4a373;
      --muted: #8a7a6a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 2rem;
      text-align: center;
      line-height: 1.6;
    }
    main { max-width: 36rem; }
    .devanagari {
      font-family: "Noto Sans Devanagari", "Sanskrit Text", serif;
      font-size: clamp(4rem, 12vw, 7rem);
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 1.5rem;
    }
    p { color: var(--muted); margin-bottom: 1rem; }
    .tag {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--muted);
      border-radius: 999px;
      font-size: 0.875rem;
      color: var(--muted);
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <div class="devanagari">रूपान्तर</div>
    <h1>Roopantar</h1>
    <p>Transformation. The act of giving a new form.</p>
    <p>An immersive interior design experience — walk through your home, talk to AI, and watch the room transform.</p>
    <span class="tag">Under construction · 2026</span>
  </main>
</body>
</html>
